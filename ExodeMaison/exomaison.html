<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Calendrier</title>

    <link rel="stylesheet" href="exomaison.css">
</head>
<body>

    <div class="calendrier">

        <div class="mois">

            <button id="precedent">←</button>

            <h1 id="nom-mois">Décembre</h1>

            <button id="suivant">→</button>

        </div>

        <div class="contenu">

            <p id="nom-jour">Jeudi</p>

            <h2 id="numero-jour">2</h2>

            <p id="annee">2021</p>

        </div>
        <input type="date" id="choisir-date">

    </div>

    <script src="exomaison.js"></script>

</body>
</html>
